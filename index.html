function build(metric){
 let d=[...data].sort((a,b)=>b[metric]-a[metric]);
 let top=d.slice(0,5);
 let bottom=d.slice(-5);
 let out=[...top];
 bottom.forEach(x=>{if(!out.find(y=>y.country===x.country)) out.push(x)});

 Plotly.newPlot('chart',[{

   orientation:'h',
   y:labels.reverse(),
   x:values.reverse(),
   marker:{color:cols.reverse()},
   customdata:out.reverse().map(r=>[r.min_wage,r.egg_price,r.affordable]),
