function subset(sortKey){
 let d=[...allData].sort((a,b)=>b[sortKey]-a[sortKey]);
 let top=d.slice(0,5);
 let bottom=d.slice(-5);
 let ids=new Set([...top.map(x=>x.country),...bottom.map(x=>x.country)]);
 let indo=allData.find(x=>x.country==="Indonesia");
 let result=[...top,...bottom.filter(x=>!top.some(t=>t.country===x.country))];
 if(indo && !ids.has("Indonesia")) result.push(indo);
 return result.sort((a,b)=>b[sortKey]-a[sortKey]);
}

function draw(sortKey){
 let d=subset(sortKey);
 Plotly.newPlot('chart',[
 {
   x:d.map(r=>r.country),
   y:d.map(r=>r.min_wage),
   type:'bar',
   marker:{color:d.map(r=>colors[r.continent]||'#999')},
   name:'Minimum wage',
   customdata:d.map(r=>[r.continent,r.egg_price,r.affordable]),
   hovertemplate:'<b>%{x}</b><br>Continent:%{customdata[0]}<br>Minimum wage:$%{y}<br>Egg price:$%{customdata[1]}<br>Buying power:%{customdata[2]} dozen/month<extra></extra>'
 },
 {
   x:d.map(r=>r.country),
   y:d.map(r=>r.egg_price),
   yaxis:'y2',
   mode:'markers+text',
   text:d.map(r=>r.country==="Indonesia"?"Indonesia":""),
   textposition:'top center',
   marker:{size:10,color:'black'},
   name:'Egg price'

   yaxis:{title:'Minimum wage (USD/month)'},
   yaxis2:{title:'Egg price (USD/dozen)',overlaying:'y',side:'right'},
   margin:{t:20,b:80},
   legend:{orientation:'h'}
 },{responsive:true});
}
